<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Property</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Body and background */
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: 
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
        url('https://images.unsplash.com/photo-1570129477492-45c003edd2be?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Form container */
    .form-box {
      background: rgba(20, 20, 20, 0.9); /* dark form */
      padding: 30px 40px;
      border-radius: 12px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.7);
      color: #fff;
    }

    .form-box h2 {
      margin-bottom: 25px;
      color: #27ae60; /* green title */
      text-align: center;
    }

    /* Form inputs */
    .form-box input, 
    .form-box textarea, 
    .form-box select {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 15px;
      border: 1px solid #444;
      border-radius: 6px;
      background-color: #1c1c1c;
      color: #fff;
      font-size: 14px;
    }

    .form-box input::placeholder,
    .form-box textarea::placeholder {
      color: #aaa;
    }

    .form-box textarea {
      resize: none;
      height: 100px;
    }

    /* Submit button */
    .form-box .btn {
      width: 100%;
      padding: 12px;
      background-color: #27ae60;
      color: #fff;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    .form-box .btn:hover {
      background-color: #1e8449;
    }
  </style>
</head>
<body>

<div class="form-box">
  <h2>Add Property</h2>
  <form action="addproperty" method="post">
  
 Title:
<input type="text" name="title" required><br><br>

City:
<input type="text" name="city" required><br><br>

Bedrooms:
<input type="number" name="bedrooms" required><br><br>

Bathrooms:
<input type="number" name="bathrooms" required><br><br>

Area (sqft):
<input type="number" name="area_sqft" required><br><br>

Image URL:
 <input type="text" name="image_url" placeholder="Image URL (paste link)" required>

Price:
<input type="number" step="10000" name="price" required><br><br>
    <select name="property_type" required>
      <option value="" disabled selected>Select Property Type</option>
      <option value="house">House</option>
      <option value="flat">Flat</option>
      <option value="plot">Plot</option>
    </select>
    <select name="transaction_type" required>
      <option value="" disabled selected>Sale or Rent</option>
      <option value="buy">Buy</option>
      <option value="rent">Rent</option>
    </select>
    <button class="btn" type="submit">Submit</button>
  </form>
</div>

</body>
</html>
