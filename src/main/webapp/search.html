<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Properties - Real Estate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)),
        url("https://images.unsplash.com/photo-1600596542815-ffad4c1539a9") no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      color: #fff;
    }

    .search-card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 30px;
    }

    .form-control, .form-select {
      background-color: rgba(255,255,255,0.1) !important;
      border: 1px solid rgba(255,255,255,0.2) !important;
      color: #fff !important;
      height: 45px;
    }

    .form-control::placeholder { color: #aaa !important; }

    .form-select option { background-color: #1a1a2e; color: #fff; }

    .form-control:focus, .form-select:focus {
      box-shadow: 0 0 0 3px rgba(39,174,96,0.3) !important;
      border-color: #27ae60 !important;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark bg-black px-4">
    <a class="navbar-brand">&#127968; RealEstate</a>
    <div>
      <a href="viewproperties" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
      <a href="mybookings" class="btn btn-outline-light btn-sm me-2">My Bookings</a>
      <a href="profile" class="btn btn-outline-light btn-sm me-2">Profile</a>
      <a href="login.html" class="btn btn-danger btn-sm">Logout</a>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="text-center mb-4">
      <h2 class="fw-bold">Search Properties</h2>
      <p class="text-secondary">Find the perfect property based on your preferences</p>
    </div>

    <div class="search-card">
      <form class="row g-3" action="searchproperty" method="post">
        <div class="col-md-3 col-12">
          <input type="text" name="city" class="form-control" placeholder="City">
        </div>
        <div class="col-md-2 col-6">
          <select name="transaction_type" class="form-select">
            <option value="">Buy / Rent</option>
            <option value="buy">Buy</option>
            <option value="rent">Rent</option>
          </select>
        </div>
        <div class="col-md-2 col-6">
          <select name="property_type" class="form-select">
            <option value="">Property Type</option>
            <option value="flat">Flat</option>
            <option value="house">House</option>
            <option value="plot">Plot</option>
          </select>
        </div>
        <div class="col-md-2 col-6">
          <input type="number" name="min_price" class="form-control" placeholder="Min Price (&#8377;)">
        </div>
        <div class="col-md-1 col-6">
          <input type="number" name="max_price" class="form-control" placeholder="Max Price">
        </div>
        <div class="col-md-1 col-6">
          <select name="bedrooms" class="form-select">
            <option value="">Beds</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4+</option>
          </select>
        </div>
        <div class="col-md-1 col-6">
          <select name="bathrooms" class="form-select">
            <option value="">Baths</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3+</option>
          </select>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-success w-100 fw-semibold" style="height:45px;">
            &#128269; Search Properties
          </button>
        </div>
      </form>
    </div>
  </div>

  <footer class="text-center text-secondary py-4 mt-5">
    <p class="mb-0">&copy; 2026 Real Estate. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
