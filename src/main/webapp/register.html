<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Register - Real Estate</title>
  <style>
    /* Full page styling */
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      position: relative;
      min-height: 100vh;
      /* Real estate background image */
      background: url('https://images.unsplash.com/photo-1570129477492-45c003edd2be?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
      background-size: cover;
    }

    /* Dark overlay */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.6); /* adjust darkness here */
      z-index: 0;
    }

    /* Form container */
    .form-box {
      width: 350px;
      padding: 40px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.95); /* semi-transparent white form */
      text-align: center;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      z-index: 1; /* above overlay */
    }

    .form-box h2 {
      margin-bottom: 30px;
      color: #333;
    }

    /* Input fields and select */
    .form-box input,
    .form-box select {
      width: 100%;
      margin-bottom: 20px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    /* Register button */
    .form-box .btn {
      width: 100%;
      padding: 12px;
      background-color: #73897c;
      border: none;
      color: #fff;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    .form-box .btn:hover {
      background-color: #219150;
    }

    /* Optional: small text for login link */
    .form-box p {
      margin-top: 15px;
      font-size: 14px;
      color: #555;
    }

    .form-box a {
      color: #27ae60;
      text-decoration: none;
    }

    .form-box a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="form-box">
  <h2>Register</h2>
  <form action="SignupServlet" method="POST">
    <input type="text" name="fullname" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>
    <select name="user_type" required>
      <option value="">Select User Type</option>
      <option value="buyer">Buyer</option>
      <option value="owner">Owner</option>
      <option value="agent">Agent</option>
    </select>
    <button type="submit" class="btn">Register</button>
  </form>
  <p>Already have an account? <a href="login.html">Login</a></p>
</div>

</body>
</html>
