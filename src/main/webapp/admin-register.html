<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Register - Real Estate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background:
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
        url("https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=1470&q=80") no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      border-radius: 14px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      background-color: rgba(255,255,255,0.95);
    }
    .form-control { border-radius: 8px; }
    .btn-admin {
      background-color: #1a1a2e;
      border-color: #1a1a2e;
      color: white;
    }
    .btn-admin:hover {
      background-color: #16213e;
      border-color: #16213e;
      color: white;
    }
  </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4" style="width: 380px;">
    <h3 class="text-center mb-1">&#9881; Admin Register</h3>
    <p class="text-center text-muted mb-4" style="font-size:13px;">Create an admin account</p>

    <form action="AdminRegisterServlet" method="post">
      <input type="hidden" name="user_type" value="admin">

      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" name="fullname" placeholder="Full name" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" name="email" placeholder="Email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" placeholder="Password" required>
      </div>

      <button type="submit" class="btn btn-admin w-100">Create Admin Account</button>

      <div id="regError" class="alert alert-danger mt-3 d-none">Registration failed. Email may already exist.</div>
    </form>

    <p class="text-center mt-3" style="font-size:13px;">
      Already have an account? <a href="admin-login.html">Login</a>
    </p>
  </div>
</div>

<script>
  if (new URLSearchParams(window.location.search).get("error") === "1") {
    document.getElementById("regError").classList.remove("d-none");
  }
</script>
</body>
</html>
