<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signup - Real Estate</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background:
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
        url("https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=1470&q=80") no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      border-radius: 14px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      background-color: rgba(255,255,255,0.95);
    }

    .form-control, .form-select {
      border-radius: 8px;
    }

    .btn-dark {
      background-color: #232323;
      border-color: #131313;
    }

    .btn-dark:hover {
      background-color: #050505;
      border-color: #060606;
    }

    select.form-select {
      margin-bottom: 15px;
    }
  </style>
</head>

<body>
<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4" style="width:380px;">
    <h3 class="text-center mb-4">Create Account</h3>

    <form action="SignupServlet" method="post">
      <div class="mb-3">
        <label for="fullname" class="form-label">Name</label>
        <input type="text" id="fullname" name="fullname" class="form-control" placeholder="Full name" required>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="Email" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
      </div>

      <div class="mb-3">
        <label for="user_type" class="form-label">User Type</label>
        <select id="user_type" class="form-select" name="user_type" required>
          <option value="">Select User Type</option>
          <option value="buyer">Buyer</option>
          <option value="owner">Owner</option>
          <option value="agent">Agent</option>
        </select>
      </div>

      <button type="submit" class="btn btn-dark w-100">Sign Up</button>

      <p class="text-center mt-3">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </form>
  </div>
</div>
</body>
</html>
