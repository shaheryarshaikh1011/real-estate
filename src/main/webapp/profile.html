<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)),
  url("https://images.unsplash.com/photo-1600585154526-990dced4db0d");
  background-size: cover;
  color: white;
}

.profile-card {
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 20px;
}

.booking-card {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-black">
  <div class="container-fluid">
    <a class="navbar-brand">👤 Profile</a>
    <div>
      <a id="dashboardLink" href="#" class="btn btn-light">Dashboard</a>
      <a href="login.html" class="btn btn-danger">Logout</a>
    </div>
  </div>
</nav>

<div class="container mt-5">

  <!-- Profile -->
  <div class="profile-card text-center">
    <h3 id="name">Loading...</h3>
    <p id="email"></p>
    <p id="role"></p>
  </div>

  <!-- Bookings -->
  <h4 class="mt-4">My Bookings</h4>
  <div id="bookingList"></div>

</div>

<script>
// 🔥 FETCH DATA FROM SERVLET
fetch("profileData")
.then(res => res.json())
.then(data => {

    document.getElementById("name").innerText = data.name;
    document.getElementById("email").innerText = "📧 " + data.email;
    document.getElementById("role").innerText = "Role: " + data.userType;

    // Dashboard link
    if(data.userType === "seller"){
        document.getElementById("dashboardLink").href = "sellerDashboard.html";
    } else {
        document.getElementById("dashboardLink").href = "buyerDashboard.html";
    }

    // Bookings
    let bookingHTML = "";

    data.bookings.forEach(b => {
        bookingHTML += `
            <div class="booking-card">
                🏠 ${b.title} - ${b.city} <br>
                💰 ₹${b.price} <br>
                📅 ${b.date}
            </div>
        `;
    });

    document.getElementById("bookingList").innerHTML = bookingHTML;

})
.catch(err => {
    console.log(err);
});
</script>

</body>
</html>
