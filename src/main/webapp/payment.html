<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment - Real Estate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                  url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c");
      background-size: cover;
      background-position: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      border-radius: 15px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    }

    h3 {
      color: #333;
    }

    .btn-pay {
      background-color: #27ae60;
      color: white;
      transition: 0.3s;
    }

    .btn-pay:hover {
      background-color: #219150;
    }

    label {
      font-weight: bold;
    }

  </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4" style="width:400px;">
    <h3 class="text-center mb-4">Payment Details</h3>

    <form action="payment_process.php" method="POST">
      <div class="mb-3">
        <label for="cardName">Card Holder Name</label>
        <input type="text" class="form-control" id="cardName" name="card_name" placeholder="John Doe" required>
      </div>

      <div class="mb-3">
        <label for="cardNumber">Card Number</label>
        <input type="text" class="form-control" id="cardNumber" name="card_number" placeholder="1234 5678 9012 3456" required>
      </div>

      <div class="row mb-3">
        <div class="col">
          <label for="expiry">Expiry Date</label>
          <input type="text" class="form-control" id="expiry" name="expiry" placeholder="MM/YY" required>
        </div>
        <div class="col">
          <label for="cvv">CVV</label>
          <input type="password" class="form-control" id="cvv" name="cvv" placeholder="123" required>
        </div>
      </div>

      <div class="mb-3">
        <label for="amount">Amount (₹)</label>
        <input type="number" class="form-control" id="amount" name="amount" placeholder="1000" required>
      </div>

      <button type="submit" class="btn btn-pay w-100">Pay Now</button>

      <p class="text-center mt-3">
        <a href="index.html" style="color:#27ae60;">Cancel and return home</a>
      </p>
    </form>
  </div>
</div>

</body>
</html>
